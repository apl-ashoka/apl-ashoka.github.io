<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Teams — APL IX</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav class="masthead">
  <div class="masthead-inner">
    <a class="masthead-logo" href="index.html">APL <span>IX</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="fixtures.html">Fixtures</a></li>
      <li><a href="standings.html">Standings</a></li>
      <li><a href="teams.html" class="active">Teams</a></li>
      <li><a href="oc.html">The OC</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Home</a><a href="fixtures.html">Fixtures</a>
    <a href="standings.html">Standings</a><a href="teams.html">Teams</a><a href="oc.html">The OC</a>
  </div>
</nav>
<div class="page">
  <div class="section-label">Participants</div>
  <div class="section-title">Teams</div>
  <div id="teams-grid" class="teams-grid"><div class="state-msg" style="grid-column:1/-1"><div class="spinner"></div>Loading teams…</div></div>
</div>
<footer><strong>APL IX</strong> · Ashoka Premier League · Ashoka University · Spring 2025<br><span style="display:block;margin-top:6px;opacity:0.6;">Organised by the APL Organizing Committee · apl@ashoka.edu.in</span></footer>
<script src="supabase.js"></script>
<script>
  document.getElementById('hamburger').addEventListener('click',()=>document.getElementById('mobile-menu').classList.toggle('open'));
  async function loadTeams(){
    const grid=document.getElementById('teams-grid');
    try{
      const teams=await sb.from('teams','?select=*&order=name.asc');
      if(!teams.length){grid.innerHTML='<div class="state-msg" style="grid-column:1/-1">No teams added yet.</div>';return;}
      grid.innerHTML=teams.map(t=>`
        <div class="team-card">
          <div class="team-badge" style="background:${t.color||'#1a6b3c'}">${t.abbr}</div>
          <div class="team-card-name">${t.name}</div>
          <div class="team-card-meta">APL IX</div>
        </div>`).join('');
    }catch(e){
      grid.innerHTML='<div class="state-msg" style="grid-column:1/-1">Could not load teams.</div>';
    }
  }
  loadTeams();
</script>
</body>
</html>
