<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fixtures — APL IX</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav class="masthead">
  <div class="masthead-inner">
    <a class="masthead-logo" href="index.html">APL <span>IX</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="fixtures.html" class="active">Fixtures</a></li>
      <li><a href="standings.html">Standings</a></li>
      <li><a href="teams.html">Teams</a></li>
      <li><a href="oc.html">The OC</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Home</a><a href="fixtures.html">Fixtures</a>
    <a href="standings.html">Standings</a><a href="teams.html">Teams</a><a href="oc.html">The OC</a>
  </div>
</nav>
<div class="page">
  <div class="section-label">Schedule & Results</div>
  <div class="section-title">Fixtures</div>
  <div class="tabs" id="day-tabs">
    <button class="tab-btn active" data-day="1">Day 1 — Fri</button>
    <button class="tab-btn" data-day="2">Day 2 — Sat</button>
    <button class="tab-btn" data-day="3">Day 3 — Sun</button>
  </div>
  <div id="fixtures-list"><div class="state-msg"><div class="spinner"></div>Loading fixtures…</div></div>
</div>
<footer><strong>APL IX</strong> · Ashoka Premier League · Ashoka University · Spring 2025<br><span style="display:block;margin-top:6px;opacity:0.6;">Organised by the APL Organizing Committee · apl@ashoka.edu.in</span></footer>
<script src="supabase.js"></script>
<script>
  document.getElementById('hamburger').addEventListener('click',()=>document.getElementById('mobile-menu').classList.toggle('open'));
  let allFixtures=[]; let currentDay=1;
  async function loadFixtures(){
    try{
      allFixtures=await sb.from('fixtures','?select=*&order=match_time.asc');
      render();
    }catch(e){
      document.getElementById('fixtures-list').innerHTML='<div class="state-msg">Could not load fixtures. Check your Supabase config.</div>';
    }
  }
  function render(){
    const list=document.getElementById('fixtures-list');
    const day=allFixtures.filter(f=>f.day===currentDay);
    if(!day.length){list.innerHTML='<div class="state-msg">No fixtures for this day yet.</div>';return;}
    list.innerHTML=day.map(f=>{
      const score=(f.status==='done'||f.status==='live')?`${f.home_score??'–'}–${f.away_score??'–'}`:'–';
      const bc=f.status==='live'?'badge-live':f.status==='done'?'badge-done':'badge-up';
      const bt=f.status==='live'?'Live':f.status==='done'?'FT':'Upcoming';
      return `<div class="fixture-card${f.status==='live'?' is-live':''}">
        <div class="team-name">${f.home_team}</div>
        <div class="score-centre"><div class="score-val">${score}</div><div class="score-meta">${f.match_time}<br><span class="badge ${bc}">${bt}</span></div></div>
        <div class="team-name right">${f.away_team}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('day-tabs').addEventListener('click',e=>{
    const btn=e.target.closest('.tab-btn');if(!btn)return;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');currentDay=parseInt(btn.dataset.day);render();
  });
  loadFixtures();
  setInterval(loadFixtures,30000);
</script>
</body>
</html>
